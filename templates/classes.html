<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-logo">
    <img src="{{ url_for('static', filename='images/logo.png') }}">
  </div>

  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  <div class="nav-overlay"></div>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/planner">Planner</a>
    <a href="/classes">Classes</a>

    {% if session.get("role") == "teacher" %}
      <a href="/teacher">My Materials</a>
      <a href="/upload">Upload</a>
    {% endif %}

    <a href="/logout">Logout</a>
  </div>
</div>

<!-- HERO -->
<div class="classes-hero">
  <div class="classes-hero-content">
    <h1>Choose Your <span>Class</span></h1>
    <p>Select your grade to explore subjects and study materials.</p>
  </div>
</div>

<!-- CARDS -->
<div class="classes-wrapper">
  <div class="classes-grid">

    {% for g in [8,9,10,11,12] %}
    <a href="/grade/{{g}}" class="class-card">
      <h2>{{g}}</h2>
      <p>Grade</p>
      <span class="live">● Live</span>
    </a>
    {% endfor %}

  </div>
</div>

<script>
const navToggle = document.querySelector(".nav-toggle");
const navLinks = document.querySelector(".nav-links");
const navOverlay = document.querySelector(".nav-overlay");
if (navToggle) {
  navToggle.addEventListener("click", () => {
    navToggle.classList.toggle("open");
    navLinks.classList.toggle("open");
    navOverlay.classList.toggle("visible");
    document.body.style.overflow = navLinks.classList.contains("open") ? "hidden" : "";
  });
  navOverlay.addEventListener("click", () => {
    navToggle.classList.remove("open");
    navLinks.classList.remove("open");
    navOverlay.classList.remove("visible");
    document.body.style.overflow = "";
  });
}
</script>
</body>
</html>
