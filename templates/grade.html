<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade {{grade}}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
</head>
<body>

<div class="navbar">
  <img src="{{ url_for('static', filename='images/logo.png') }}" height="40">

  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  <div class="nav-overlay"></div>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/planner">Planner</a>
    <a href="/classes">Classes</a>

    {% if session.get("role") == "teacher" %}
      <a href="/teacher">My Materials</a>
      <a href="/upload">Upload</a>
    {% endif %}

    <a href="/logout">Logout</a>
  </div>
</div>

<div style="padding:40px; max-width:1100px; margin:auto;">

  <div class="card">

    <h1>Grade {{grade}}</h1>
    <p style="color:#666;">Select a subject</p>

    <div class="grid">

    {% for code, name in subjects.items() %}
    <div class="subject-card"
        onclick="window.location.href='/subject/{{grade}}/{{code}}'">

        <div class="subject-icon">
        {{ icons[code] if icons else "📘" }}
        </div>

        <h3>{{ name }}</h3>

    </div>
    {% endfor %}

    </div>

  </div>

</div>

<script>
const navToggle = document.querySelector(".nav-toggle");
const navLinks = document.querySelector(".nav-links");
const navOverlay = document.querySelector(".nav-overlay");
if (navToggle) {
  navToggle.addEventListener("click", () => {
    navToggle.classList.toggle("open");
    navLinks.classList.toggle("open");
    navOverlay.classList.toggle("visible");
    document.body.style.overflow = navLinks.classList.contains("open") ? "hidden" : "";
  });
  navOverlay.addEventListener("click", () => {
    navToggle.classList.remove("open");
    navLinks.classList.remove("open");
    navOverlay.classList.remove("visible");
    document.body.style.overflow = "";
  });
}
</script>
</body>
</html>
