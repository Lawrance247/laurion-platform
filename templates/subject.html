<!DOCTYPE html>
<html>
<head>
    <title>{{subject}}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="{{ url_for('static', filename='images/logo.png') }}" height="40">

  <div class="nav-links">
    <a href="/classes">Classes</a>

    {% if session.get("role") == "teacher" %}
      <a href="/teacher">My Materials</a>
      <a href="/upload">Upload</a>
    {% endif %}

    <a href="/dashboard">Dashboard</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- CONTENT -->
<div style="padding:40px; max-width:1100px; margin:auto;">

  <div class="card">

    <h1>Grade {{grade}} — {{subject}}</h1>
    <p style="color:#666;">Available materials</p>

    <div class="material-grid">

      {% for item in materials %}
      <div class="material-card">

        <div class="material-icon">
          {{ get_file_icon(item.filename) }}
        </div>

        <div class="material-info">
          <h3>{{ item.title }}</h3>
          <p>Grade {{ item.grade }} • {{ subject }}</p>
        </div>

        <a href="{{ url_for('static', filename='uploads/' + item.filename) }}"
           class="download-btn">
          Download
        </a>

      </div>
      {% endfor %}

    </div>

  </div>

</div>

</body>
</html>
